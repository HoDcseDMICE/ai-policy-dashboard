[theme]
primaryColor = "#0ea5e9"
backgroundColor = "#041025"
secondaryBackgroundColor = "#071127"
textColor = "#e2e8f0"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "viewer"

[logger]
level = "info"

[server]
address = "127.0.0.1"
port = 8501
headless = true
runOnSave = false
maxUploadSize = 1024
enableXsrfProtection = false
enableCORS = false

[browser]
gatherUsageStats = false
